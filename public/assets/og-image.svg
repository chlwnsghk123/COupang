<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Play triangle -->
  <g transform="translate(600 240)">
    <circle r="64" fill="#111111"/>
    <polygon points="-18,-26 -18,26 26,0" fill="#ffffff"/>
  </g>

  <!-- Title -->
  <text x="600" y="400" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif"
        font-size="72" font-weight="700" fill="#111111" letter-spacing="-2">
    Video Embed
  </text>

  <!-- Subtitle -->
  <text x="600" y="450" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif"
        font-size="26" font-weight="400" fill="#737373">
    유튜브 → 쿠팡 상세페이지 자동재생 코드
  </text>

  <!-- Domain -->
  <text x="600" y="540" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="500" fill="#737373" letter-spacing="1">
    video-embed.com
  </text>
</svg>
